<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF PAIR PROFILE - FOUR PANELS</title>
    <!-- Pretendard 폰트 로드 (고정) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            /* 네온 색상 상수 */
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --sf-text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            /* 글래스모피즘 배경 */
            --glass-bg: rgba(0, 0, 0, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif; /* 폰트 고정 */
        }

        body {
            background-color: #000;
            overflow: hidden; /* 스크롤 불허, 이미지 꽉 차게 */
            color: var(--sf-text);
            width: 100vw;
            height: 100vh;
        }

        /* 메인 캡처 캔버스 */
        .capture-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex; /* 수평 배치 */
            overflow: hidden;
        }

        /* --- 이미지 패널 공통 스타일 --- */
        .img-panel {
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            transition: background-image 0.5s ease;
        }

        /* 이미지 업로드 전 임시 색상 */
        #panel-sub-a { background-color: #0a0a0a; width: 15vw; } /* 서브이미지: 좁게 */
        #panel-bg-a  { background-color: #121212; width: 35vw; }
        #panel-bg-b  { background-color: #121212; width: 35vw; }
        #panel-sub-b { background-color: #0a0a0a; width: 15vw; } /* 서브이미지: 좁게 */

        /* 패널 사이 미세한 네온 라인 (미학적 디테일) */
        .img-panel::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 1px; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
        }
        #panel-sub-a { border-right: 1px solid rgba(0, 240, 255, 0.2); }
        #panel-sub-b { border-left: 1px solid rgba(255, 0, 85, 0.2); }

        /* --- 텍스트 및 UI 레이어 (이미지 위에 뜸) --- */
        .interface-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* 클릭 이벤트는 자식 요소만 받음 */
            display: flex;
            justify-content: space-between; /* 양옆 배치 */
            padding: 60px;
        }

        /* 업로드 UI 버튼 세팅 */
        .upload-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto; /* 버튼은 클릭 가능 */
            background: rgba(0,0,0,0.5);
            padding: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
        }

        .sf-btn {
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .sf-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }
        .sf-btn input[type="file"] { display: none; }


        /* --- 중앙 하단 페어명 --- */
        .center-pair-hud {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 50vw;
            pointer-events: auto;
        }

        .center-pair-hud input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 3.2vw;
            font-weight: 900;
            text-align: center;
            letter-spacing: 0.4em;
            outline: none;
            text-shadow: 0 0 15px rgba(255,255,255,0.5), 0 0 30px rgba(0,0,0,1);
            width: 100%;
            text-transform: uppercase;
        }


        /* --- 미학적 프로필 패널 디자인 --- */
        .profile-panel {
            pointer-events: auto; /* 텍스트 수정 가능 */
            width: 20vw; /* 적절한 너비 */
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 하단 정렬 */
            position: relative;
        }

        /* 글래스모피즘 배경 박스 */
        .profile-box {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        /* 프로필 포인트 네온 라인 디테일 */
        .profile-box::before {
            content: '';
            position: absolute;
            top: 0; width: 60px; height: 2px;
        }

        /* 왼쪽 캐릭터 프로필: 서브 A와 가깝게, 간격을 둠 */
        .profile-panel.left {
            margin-left: 17vw; /* 서브패널(15vw) + 간격(2vw) */
        }
        .profile-panel.left .profile-box {
            border-left: 3px solid var(--neon-cyan);
            box-shadow: -10px 0 20px rgba(0, 240, 255, 0.1);
        }
        .profile-panel.left .profile-box::before { left: 0; background-color: var(--neon-cyan); }

        /* 오른쪽 캐릭터 프로필: 서브 B와 가깝게, 간격을 둠 */
        .profile-panel.right {
            margin-right: 17vw; /* 서브패널(15vw) + 간격(2vw) */
            text-align: right;
        }
        .profile-panel.right .profile-box {
            border-right: 3px solid var(--neon-pink);
            box-shadow: 10px 0 20px rgba(255, 0, 85, 0.1);
        }
        .profile-panel.right .profile-box::before { right: 0; background-color: var(--neon-pink); }


        /* 텍스트 스타일링 */
        .sf-id {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.3em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .sf-name {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }
        .profile-panel.left .sf-name { text-shadow: 0 0 10px var(--neon-cyan); }
        .profile-panel.right .sf-name { text-shadow: 0 0 10px var(--neon-pink); }

        .sf-desc {
            font-size: 14px;
            line-height: 1.8;
            color: #d1d5db;
            font-weight: 300;
            word-break: keep-all;
        }
        
        /* 스크롤바 숨기기 (텍스트가 많을 경우 대비) */
        .sf-desc::-webkit-scrollbar { display: none; } 
        .sf-desc { -ms-overflow-style: none; scrollbar-width: none; }

    </style>
</head>
<body>
    <div class="capture-canvas" id="export-area">
        
        <!-- [LAYER 1] 4개의 이미지 패널 (호라이즌) -->
        <div class="img-panel" id="panel-sub-a"></div>
        <div class="img-panel" id="panel-bg-a"></div>
        <div class="img-panel" id="panel-bg-b"></div>
        <div class="img-panel" id="panel-sub-b"></div>

        <!-- [LAYER 2] 인터페이스 레이어 (HUD, 프로필) -->
        <div class="interface-layer">
            
            <!-- 업로드 HUD (상단 중앙) -->
            <div class="upload-hud">
                <label class="sf-btn">Sub A<input type="file" accept="image/*" onchange="loadImage(event, 'panel-sub-a')"></label>
                <label class="sf-btn">Bg A<input type="file" accept="image/*" onchange="loadImage(event, 'panel-bg-a')"></label>
                <span style="color:rgba(255,255,255,0.3); size: 10px;">|</span>
                <label class="sf-btn">Bg B<input type="file" accept="image/*" onchange="loadImage(event, 'panel-bg-b')"></label>
                <label class="sf-btn">Sub B<input type="file" accept="image/*" onchange="loadImage(event, 'panel-sub-b')"></label>
            </div>

            <!-- 왼쪽 프로필 (서브 A 쪽) -->
            <div class="profile-panel left">
                <div class="profile-box">
                    <div class="sf-id">Subject // Alpha</div>
                    <div class="sf-name" contenteditable="true">CHARACTER A</div>
                    <div class="sf-desc" contenteditable="true" style="max-height: 200px; overflow-y: auto;">
                        여기에 캐릭터 A의 프로필을 입력하세요. 서브 이미지 패널 옆에 미학적인 간격을 두고 배치되었습니다.<br>글래스모피즘 박스와 네온 포인트가 근미래 분위기를 연출합니다.
                    </div>
                </div>
            </div>

            <!-- 오른쪽 프로필 (서브 B 쪽) -->
            <div class="profile-panel right">
                <div class="profile-box">
                    <div class="sf-id">Subject // Omega</div>
                    <div class="sf-name" contenteditable="true" style="color: var(--neon-pink);">CHARACTER B</div>
                    <div class="sf-desc" contenteditable="true" style="max-height: 200px; overflow-y: auto;">
                        캐릭터 B의 데이터 공간입니다.<br>양쪽 프로필은 서로 대칭을 이루며 완벽한 균형을 맞춥니다.<br>클릭하여 내용을 수정하십시오.
                    </div>
                </div>
            </div>

            <!-- 중앙 하단 페어명 -->
            <div class="center-pair-hud">
                <input type="text" placeholder="PAIR CONNECTION" spellcheck="false">
            </div>

        </div>

    </div>

    <script>
        // 이미지 렌더링 함수 (로컬 파일 읽기)
        function loadImage(event, targetId) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const targetElement = document.getElementById(targetId);
                targetElement.style.backgroundImage = `url('${e.target.result}')`;
                console.log(`[SYSTEM] ${targetId} 데이터 로드 완료.`);
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
